name: Android APK Release

on:
  workflow_dispatch:

jobs:
  build-android-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      BUILDOZER_WARN_ON_ROOT: "0"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
      P4A_RELEASE_KEYSTORE: /tmp/rotorprotek-release.keystore
      P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-buildozer.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Buildozer caches
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-buildozer-release-${{ hashFiles('buildozer.spec', 'requirements-buildozer.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-release-
            ${{ runner.os }}-buildozer-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses6 libncurses5 libtinfo5 \
            cmake libffi-dev libssl-dev libltdl-dev \
            build-essential ccache \
            libjpeg-dev libfreetype6-dev

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-buildozer.txt

      - name: Materialize release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$P4A_RELEASE_KEYSTORE"

      - name: Build release APK
        run: |
          yes | buildozer android release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotorprotek-android-apk-release
          path: |
            bin/*release*.apk
          if-no-files-found: error
