name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "main.py"
      - "buildozer.spec"
      - "requirements-buildozer.txt"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "app/**"
      - "main.py"
      - "buildozer.spec"
      - "requirements-buildozer.txt"
      - ".github/workflows/android-apk.yml"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-buildozer.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Buildozer caches
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements-buildozer.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses6 libncurses5 libtinfo5 \
            cmake libffi-dev libssl-dev libltdl-dev \
            build-essential ccache \
            libjpeg-dev libfreetype6-dev

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-buildozer.txt

      - name: Build debug APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotorprotek-android-apk
          path: |
            bin/*.apk
          if-no-files-found: error
